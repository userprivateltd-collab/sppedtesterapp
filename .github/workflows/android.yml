name: Android CI (Auto-Build & Release APK)

on:
  push:
    tags:
      - 'v*' # This triggers the workflow ONLY when you push a version tag like v1.0, v1.1, etc.

permissions:
  contents: write # Crucial permission that allows the script to create a release page

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename APK for Release
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/KnowIt-SpeedTest.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/KnowIt-SpeedTest.apk
